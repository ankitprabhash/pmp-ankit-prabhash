// ── Timer state ──────────────────────────────────────────────
const TOTAL_SECS = 3*3600 + 50*60; // 3h50m
let timeLeft = TOTAL_SECS;
let timerInterval = null;
let timerRunning = false;

function startTimer(){
  if(timerRunning) return;
  timerRunning = true;
  timerInterval = setInterval(()=>{
    if(timeLeft <= 0){ clearInterval(timerInterval); return; }
    timeLeft--;
    updateTimerDisplay();
  },1000);
}

function pauseTimer(){ timerRunning=false; clearInterval(timerInterval); }

function updateTimerDisplay(){
  const h=Math.floor(timeLeft/3600);
  const m=Math.floor((timeLeft%3600)/60);
  const s=timeLeft%60;
  const str = h+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  document.getElementById('s-timer').textContent=str;
  const el=document.getElementById('timer-stat');
  el.className='stat';
  if(timeLeft<600) el.className='stat timer-danger';
  else if(timeLeft<1800) el.className='stat timer-warn';
}

// ── Break state ──────────────────────────────────────────────
let breakSecondsLeft = 600;
let breakInterval = null;
const BREAK_EVERY = 60;
let lastBreakAt = 0;

function showBreak(answeredCount){
  pauseTimer();
  lastBreakAt = answeredCount;
  breakSecondsLeft = 600;
  document.getElementById('break-q-count').textContent = answeredCount;
  document.getElementById('break-overlay').style.display='flex';
  updateBreakTimer();
  breakInterval = setInterval(()=>{
    breakSecondsLeft--;
    updateBreakTimer();
    if(breakSecondsLeft<=0) endBreak();
  },1000);
}

function updateBreakTimer(){
  const m=Math.floor(breakSecondsLeft/60);
  const s=breakSecondsLeft%60;
  document.getElementById('break-timer').textContent=m+':'+String(s).padStart(2,'0');
}

function endBreak(){
  clearInterval(breakInterval);
  document.getElementById('break-overlay').style.display='none';
  startTimer();
}

function skipBreak(){
  clearInterval(breakInterval);
  document.getElementById('break-overlay').style.display='none';
  startTimer();
}

// ── Quiz state ───────────────────────────────────────────────
let cur=0, score=0, wrong=0;
let answered=[]; // single: number, multi: number[], skip: 'skip'
let multiSel=[]; // temp multi selections before submit
let marked=[];
const total=QS.length;

function updateHeader(){
  document.getElementById('s-cur').textContent=(cur+1)+' / '+total;
  document.getElementById('s-right').textContent=score;
  document.getElementById('s-wrong').textContent=wrong;
  const d=score+wrong;
  document.getElementById('s-pct').textContent=d>0?Math.round(score/d*100)+'%':'—';
  document.getElementById('prog').style.width=Math.max(0.5,Math.round((cur+1)/total*100))+'%';
}

function isCorrect(q, ans){
  if(q.multi){
    const correctSet = [...q.ans].sort().join(',');
    const ansSet = [...ans].sort().join(',');
    return correctSet === ansSet;
  }
  return ans === q.ans;
}

function render(){
  if(!timerRunning && cur>0) startTimer();
  updateHeader();
  const q=QS[cur];
  const isAns = answered[cur] !== undefined;
  const isMarked = marked[cur];
  const isMulti = q.multi===true;

  let html = '<div class="q-label">';
  html += `<span>Question ${cur+1} of ${total}</span>`;
  if(isMarked) html += '<span class="marked-badge">⭐ Marked</span>';
  if(isMulti) html += '<span class="multi-badge">Select TWO answers</span>';
  if(answered[cur]==='skip') html += '<span style="background:#f0f0f0;color:#999;font-size:11px;padding:2px 8px;border-radius:12px;border:1px solid #ddd">Skipped</span>';
  html += '</div>';
  html += `<div class="q-text">${q.q}</div><div class="options">`;

  q.opts.forEach((opt,i)=>{
    let cls='opt';
    let icon='';
    if(isAns && answered[cur]!=='skip'){
      cls+=' disabled';
      const correctAnswers = Array.isArray(q.ans)?q.ans:[q.ans];
      const userAnswers = Array.isArray(answered[cur])?answered[cur]:[answered[cur]];
      const isCorrectChoice = correctAnswers.includes(i);
      const userChose = userAnswers.includes(i);
      if(userChose && isCorrectChoice){ cls+=' correct'; icon='✓'; }
      else if(userChose && !isCorrectChoice){ cls+=' wrong'; icon='✗'; }
      else if(!userChose && isCorrectChoice){ cls+=' missed'; icon='✓'; }
    } else if(isAns && answered[cur]==='skip'){
      cls+=' disabled';
      const correctAnswers = Array.isArray(q.ans)?q.ans:[q.ans];
      if(correctAnswers.includes(i)){ cls+=' correct'; icon='✓'; }
    } else if(isMulti && multiSel.includes(i)){
      cls+=' selected';
    }
    html += `<button class="${cls}" onclick="${isMulti && !isAns ? `toggleMulti(${i})` : (!isAns && !isMulti ? `selectOpt(${i})` : '')}">`
          + `<span class="opt-key">${String.fromCharCode(65+i)}</span>${opt}`
          + (icon?`<span class="opt-icon">${icon}</span>`:'')
          + '</button>';
  });
  html += '</div>';

  // Multi submit button
  if(isMulti && !isAns){
    html += `<button class="submit-btn" id="submit-multi" onclick="submitMulti()" ${multiSel.length<2?'disabled':''}>Submit ${multiSel.length}/2 selected</button>`;
  }

  if(isAns && answered[cur]!=='skip'){
    const correct = isCorrect(q, answered[cur]);
    const correctLetters = (Array.isArray(q.ans)?q.ans:[q.ans]).map(i=>String.fromCharCode(65+i)).join(' & ');
    html += `<div class="explanation ${correct?'correct-exp':'wrong-exp'}">
      <div class="ans-badge ${correct?'correct':'wrong'}">${correct?'✓ Correct!':'✗ Incorrect — Correct: '+correctLetters}</div>
      <div class="exp-title">Explanation</div>
      <div>${q.exp}</div>
    </div>`;
  } else if(isAns && answered[cur]==='skip'){
    const correctLetters = (Array.isArray(q.ans)?q.ans:[q.ans]).map(i=>String.fromCharCode(65+i)).join(' & ');
    html += `<div class="explanation" style="border-left-color:#aaa">
      <div class="ans-badge" style="background:#f0f0f0;color:#555;border:1px solid #ccc">⏭ Skipped — Correct: ${correctLetters}</div>
      <div class="exp-title">Explanation</div>
      <div>${q.exp}</div>
    </div>`;
  }

  html += '<div class="btns">';
  html += `<button class="btn" onclick="prev()" ${cur===0?'disabled':''}>← Previous</button>`;
  html += '<div style="display:flex;gap:8px;">';
  html += `<button class="btn mark ${isMarked?'active':''}" onclick="toggleMark()">${isMarked?'⭐ Marked':'☆ Mark'}</button>`;
  if(!isAns) html += `<button class="btn skip-btn" onclick="skipQ()">Skip →</button>`;
  html += '</div>';

  if(isAns && cur<total-1) html += `<button class="btn primary" onclick="next()">Next →</button>`;
  else if(isAns && cur===total-1) html += `<button class="btn primary" onclick="showDone()">Finish Quiz ✓</button>`;
  else html += `<button class="btn primary" disabled>${isMulti?'Select 2 to continue':'Answer to continue →'}</button>`;
  html += '</div>';

  html += `<div class="nav-box">
    <div class="review-title">Question Navigator</div>
    <div class="review-grid">
    ${QS.map((_,i)=>{
      let cls='r-dot';
      if(answered[i]!==undefined){
        if(answered[i]==='skip') cls+=' ans-skip';
        else cls += isCorrect(QS[i],answered[i])?' ans-right':' ans-wrong';
      } else if(marked[i]) cls+=' ans-mark';
      if(i===cur) cls+=' ans-curr';
      return `<div class="${cls}" onclick="jump(${i})" title="Q${i+1}">${answered[i]==='skip'?'⏭':(i+1)}</div>`;
    }).join('')}
    </div>
    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:#e8f5ef;border-color:#0a6644"></span>Correct</span>
      <span class="legend-item"><span class="legend-dot" style="background:#fdf0ed;border-color:#8b2a1a"></span>Wrong</span>
      <span class="legend-item"><span class="legend-dot" style="background:#f0f0f0;border-color:#ccc"></span>Skipped</span>
      <span class="legend-item"><span class="legend-dot" style="background:#fff3cd;border-color:#ffc107"></span>Marked</span>
      <span class="legend-item"><span class="legend-dot" style="background:#f9f9f7;border-color:#d8d8d0"></span>Unanswered</span>
    </div>
  </div>`;

  document.getElementById('main').innerHTML=html;
}

function toggleMulti(i){
  if(answered[cur]!==undefined) return;
  const idx=multiSel.indexOf(i);
  if(idx>-1) multiSel.splice(idx,1);
  else if(multiSel.length<2) multiSel.push(i);
  render();
}

function submitMulti(){
  if(multiSel.length<2) return;
  const q=QS[cur];
  answered[cur]=[...multiSel];
  multiSel=[];
  const correct = isCorrect(q, answered[cur]);
  if(correct) score++; else wrong++;
  checkBreak();
  render();
}

function selectOpt(i){
  if(answered[cur]!==undefined) return;
  answered[cur]=i;
  if(i===QS[cur].ans) score++; else wrong++;
  multiSel=[];
  checkBreak();
  render();
}

function skipQ(){
  if(answered[cur]!==undefined) return;
  answered[cur]='skip';
  multiSel=[];
  // Check break based on non-skip answered count
  checkBreak();
  if(cur<total-1){cur++;render();window.scrollTo(0,0);}
}

function checkBreak(){
  const answeredCount = answered.filter(a=>a!==undefined && a!=='skip').length;
  if(answeredCount>0 && answeredCount%BREAK_EVERY===0 && answeredCount!==lastBreakAt){
    showBreak(answeredCount);
  }
}

function next(){if(cur<total-1){cur++;multiSel=[];render();window.scrollTo(0,0);}}
function prev(){if(cur>0){cur--;multiSel=[];render();window.scrollTo(0,0);}}
function jump(i){cur=i;multiSel=[];render();window.scrollTo(0,0);}
function toggleMark(){marked[cur]=!marked[cur];render();}

// ── Topic Analysis ───────────────────────────────────────────
const TOPICS = {
  'Agile & Scrum': ['agile','sprint','scrum','kanban','product owner','backlog','mvp','velocity','retrospective','daily scrum','iteration'],
  'Risk Management': ['risk','uncertainty','contingency','monte carlo','probability','risk register','mitigation','threat'],
  'Stakeholder Mgmt': ['stakeholder','sponsor','executive','city official','department head','client expectation'],
  'Communication': ['communication','report','email','update','meeting agenda','newsletter','information flow','feedback','channel'],
  'Quality': ['quality','audit','non-conformance','defect','testing','inspection','benchmark','standard','conformance'],
  'Schedule & EVM': ['schedule','timeline','delay','milestone','deadline','critical path','fast track','crashing','eac','spi','cpi','earned value','evm'],
  'Team & Leadership': ['team','developer','conflict','morale','motivation','recognize','training','mentor','onboard','performance review','servant lead'],
  'Scope & Change': ['scope','wbs','requirement','feature','deliverable','charter','change request','change control','baseline'],
  'Procurement': ['vendor','contractor','supplier','procurement','contract','outsource','external'],
  'Planning': ['planning','plan','estimate','estimation','budget','rolling wave','progressive elaboration','risk planning']
};

function getTopicForQuestion(q){
  const text=(q.q+' '+(q.exp||'')).toLowerCase();
  let best=null, bestScore=0;
  for(const [topic,kws] of Object.entries(TOPICS)){
    let s=0;
    for(const kw of kws) if(text.includes(kw)) s++;
    if(s>bestScore){bestScore=s;best=topic;}
  }
  return best||'General PM';
}

function showDone(){
  pauseTimer();
  updateHeader();
  const pct=Math.round(score/total*100);
  const pass=pct>=70;

  // Build topic analysis
  const topicStats={};
  QS.forEach((q,i)=>{
    const topic=getTopicForQuestion(q);
    if(!topicStats[topic]) topicStats[topic]={correct:0,wrong:0,skip:0,total:0};
    topicStats[topic].total++;
    if(answered[i]==='skip') topicStats[topic].skip++;
    else if(answered[i]!==undefined){
      if(isCorrect(q,answered[i])) topicStats[topic].correct++;
      else topicStats[topic].wrong++;
    }
  });

  // Sort by performance (worst first)
  const topicArr=Object.entries(topicStats)
    .filter(([,s])=>s.total>0)
    .map(([topic,s])=>({topic,pct:s.total-s.skip>0?Math.round(s.correct/(s.total-s.skip)*100):null,...s}))
    .sort((a,b)=>(a.pct??100)-(b.pct??100));

  let analysisHtml='<div class="analysis-section"><div class="analysis-title">📊 Your Performance by Topic</div>';
  topicArr.forEach(({topic,pct,correct,wrong:w,skip,total:t})=>{
    const attempted=t-skip;
    const barPct=pct??0;
    const barCls=barPct>=75?'good':barPct>=55?'medium':'bad';
    const focusCls=barPct<55?'high':barPct<75?'med':'';
    const focusLabel=barPct<55?'⚠ Focus area':barPct<75?'● Review':'';
    analysisHtml+=`<div class="topic-row">
      <span class="topic-name">${topic}</span>
      <div class="topic-bar-wrap"><div class="topic-bar ${barCls}" style="width:${barPct}%"></div></div>
      <span class="topic-pct">${pct!==null?pct+'%':'—'}</span>
      <span class="topic-count">${correct}/${attempted}</span>
      ${focusLabel?`<span class="focus-label ${focusCls}">${focusLabel}</span>`:''}
    </div>`;
  });

  const weakTopics=topicArr.filter(t=>t.pct!==null&&t.pct<60).map(t=>t.topic);
  if(weakTopics.length>0){
    analysisHtml+=`<div class="analysis-note">📌 <strong>Priority study areas:</strong> ${weakTopics.join(', ')}. Focus on these topics before your exam — they represent the most opportunity for improvement.</div>`;
  } else {
    analysisHtml+='<div class="analysis-note">✅ You performed well across all topic areas! Keep reviewing any marked questions and aim for consistent 75%+ on each topic.</div>';
  }
  analysisHtml+='</div>';

  const elapsed=TOTAL_SECS-timeLeft;
  const eh=Math.floor(elapsed/3600), em=Math.floor((elapsed%3600)/60), es=elapsed%60;
  const skipped=answered.filter(a=>a==='skip').length;

  document.getElementById('main').innerHTML=`
<div class="done-screen">
  <div class="done-icon">${pass?'🏆':'📚'}</div>
  <div class="done-score">${pct}%</div>
  <div class="done-sub">${score} correct · ${wrong} wrong · ${skipped} skipped · ${total} questions</div>
  <div class="done-sub" style="font-size:13px;color:#aaa;margin-top:4px">Time used: ${eh}h ${em}m ${es}s</div>
  <div style="text-align:center"><div class="done-msg ${pass?'pass':'fail'}">
    ${pass?'Great job! You\'re likely ready for the PMP exam.':'Keep studying — aim for 70%+ before taking the real exam.'}
  </div></div>
  <div style="font-size:13px;color:#888;margin:0.5rem 0 1rem;text-align:center">Ankit Prabhash says: 70%+ on these ultra-hard questions means you should pass the real PMP exam easily.</div>
  <div class="done-btns">
    <button class="btn primary" onclick="restart()">↺ Restart Quiz</button>
    <button class="btn" onclick="reviewWrong()">Review Wrong (${wrong})</button>
    <button class="btn" onclick="reviewMarked()">Review Marked (${marked.filter(Boolean).length})</button>
    <button class="btn" onclick="reviewSkipped()">Review Skipped (${skipped})</button>
  </div>
</div>
${analysisHtml}`;
}

function restart(){cur=0;score=0;wrong=0;answered=[];marked=[];multiSel=[];timeLeft=TOTAL_SECS;lastBreakAt=0;pauseTimer();updateTimerDisplay();render();}
function reviewWrong(){const f=answered.findIndex((a,i)=>a!==undefined&&a!=='skip'&&!isCorrect(QS[i],a));if(f>=0){cur=f;multiSel=[];render();window.scrollTo(0,0);}}
function reviewMarked(){const f=marked.findIndex(Boolean);if(f>=0){cur=f;multiSel=[];render();window.scrollTo(0,0);}}
function reviewSkipped(){const f=answered.findIndex(a=>a==='skip');if(f>=0){cur=f;answered[f]=undefined;multiSel=[];render();window.scrollTo(0,0);}}

// Start timer on first interaction
document.addEventListener('click',()=>{ if(!timerRunning&&cur===0&&answered[0]===undefined) startTimer(); },{once:true});

render();
</script>
</body>
</html>

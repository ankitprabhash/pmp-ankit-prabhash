<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIA PMP – 100 Drag & Drop Questions</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--s2:#22263a;--border:#2e3248;--accent:#5b6af0;--green:#22c55e;--red:#ef4444;--text:#e8eaf0;--muted:#7880a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;min-height:100vh;}
.hdr{background:#1a1d27;border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;}
.hdr h1{font-size:17px;font-weight:700;color:#fff;}
.hdr p{font-size:12px;color:var(--muted);margin-top:2px;}
.hdr-r{display:flex;gap:10px;align-items:center;}
.pill{background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;}
.pill span{color:var(--accent);}
.pbar{height:3px;background:var(--s2);}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#7c3aed);transition:width .4s;}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-ghost{background:var(--s2);color:var(--text);border:1px solid var(--border);}
.btn-green{background:var(--green);color:#fff;}
.btn-outline{background:transparent;color:var(--accent);border:1px solid var(--accent);}
.wrap{max-width:920px;margin:0 auto;padding:28px 20px 80px;}
.qnav{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:24px;}
.qnb{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.qnb:hover{border-color:var(--accent);color:#fff;}
.qnb.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.qnb.ok{background:#15432a;border-color:var(--green);color:var(--green);}
.qnb.bad{background:#3d1515;border-color:var(--red);color:var(--red);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;}
.qmeta{display:flex;gap:8px;margin-bottom:16px;}
.qnum{background:var(--accent);color:#fff;font-size:12px;font-weight:700;padding:3px 9px;border-radius:5px;}
.qtag{background:#252940;color:var(--muted);font-size:11px;font-weight:600;padding:3px 9px;border-radius:5px;text-transform:uppercase;}
.qtitle{font-size:14px;font-weight:600;color:#fff;margin-bottom:20px;line-height:1.5;}
.dnd{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
@media(max-width:600px){.dnd{grid-template-columns:1fr;}}
.col-hd{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px;}
.bank{display:flex;flex-direction:column;gap:7px;min-height:40px;padding:4px;border-radius:8px;transition:background .15s;}
.bank.over{background:rgba(91,106,240,.08);}
.chip{background:var(--s2);border:1.5px solid var(--border);border-radius:7px;padding:9px 12px;font-size:13px;font-weight:500;cursor:grab;user-select:none;display:flex;align-items:center;gap:7px;transition:all .15s;}
.chip::before{content:'⠿';color:var(--muted);font-size:13px;flex-shrink:0;}
.chip:hover{border-color:var(--accent);background:#1e2235;}
.chip.dragging{opacity:.35;}
.targets{display:flex;flex-direction:column;gap:10px;}
.trow{display:flex;flex-direction:column;gap:5px;}
.tlabel{font-size:12px;color:var(--muted);font-weight:500;padding-left:3px;line-height:1.4;}
.zone{min-height:44px;border:1.5px dashed var(--border);border-radius:7px;padding:5px;transition:all .15s;display:flex;flex-direction:column;gap:4px;}
.zone.over{border-color:var(--accent);background:rgba(91,106,240,.07);}
.zone .chip{cursor:pointer;}
.zone .chip:hover{border-color:var(--red);background:#2a0e0e;}
.zone.z-ok{border-color:var(--green);background:rgba(34,197,94,.06);}
.zone.z-bad{border-color:var(--red);background:rgba(239,68,68,.06);}
.chip.c-ok{border-color:var(--green);color:var(--green);background:#0e2a1a;cursor:default;}
.chip.c-bad{border-color:var(--red);color:var(--red);background:#2a0e0e;cursor:default;}
.hint{font-size:11px;font-weight:700;text-transform:uppercase;margin-top:3px;padding-left:3px;}
.hint.ok{color:var(--green);}
.hint.bad{color:var(--red);}
.empty{font-size:12px;color:var(--border);text-align:center;padding:8px;font-style:italic;}
.banner{display:none;padding:11px 14px;border-radius:8px;font-size:13px;font-weight:600;margin-top:14px;align-items:center;gap:7px;}
.banner.show{display:flex;}
.banner.ok{background:rgba(34,197,94,.1);border:1px solid var(--green);color:var(--green);}
.banner.bad{background:rgba(239,68,68,.1);border:1px solid var(--red);color:var(--red);}
.exp{margin-top:14px;background:#151828;border-left:3px solid var(--accent);border-radius:0 7px 7px 0;padding:13px 15px;font-size:13px;line-height:1.65;color:#b8bcd4;display:none;}
.exp.show{display:block;}
.exp strong{color:var(--text);}
.actions{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;align-items:center;}
.actions .btn-primary{margin-left:auto;}
.final{display:none;text-align:center;padding:60px 20px;}
.final.show{display:block;}
.fcircle{width:130px;height:130px;border-radius:50%;border:4px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 22px;background:var(--surface);}
.fcircle .pct{font-size:34px;font-weight:800;color:var(--accent);}
.fcircle .lbl{font-size:11px;color:var(--muted);}
.final h2{font-size:22px;font-weight:700;margin-bottom:8px;}
.final p{color:var(--muted);margin-bottom:26px;}
.stats{display:flex;justify-content:center;gap:30px;margin-bottom:28px;}
.stat .v{font-size:28px;font-weight:800;}
.stat .l{font-size:12px;color:var(--muted);}
.v.g{color:var(--green);}
.v.r{color:var(--red);}
</style>
</head>
<body>
<div class="hdr">
  <div><h1>TIA PMP — 100 Drag &amp; Drop Questions</h1><p>Ankit Prabhash · Match each item to its correct category · <a href="https://www.linkedin.com/in/ankitprabhash/" target="_blank" style="color:var(--accent);text-decoration:none;">Connect on LinkedIn</a></p></div>
  <div class="hdr-r">
    <div class="pill">Score: <span id="sc">0</span> / <span id="at">0</span></div>
    <button class="btn btn-ghost" onclick="resetAll()">Reset All</button>
    <button class="btn btn-primary" onclick="showFinal()">Finish</button>
  </div>
</div>
<div class="pbar"><div class="pbar-fill" id="pb" style="width:0%"></div></div>
<div class="wrap">
  <div class="qnav" id="nav"></div>
  <div id="qc"></div>
  <div class="final" id="fin">
    <div class="fcircle"><div class="pct" id="fpct">0%</div><div class="lbl">Score</div></div>
    <h2 id="fmsg"></h2><p id="fsub"></p>
    <div class="stats">
      <div class="stat"><div class="v g" id="fc">0</div><div class="l">Correct</div></div>
      <div class="stat"><div class="v r" id="fw">0</div><div class="l">Wrong</div></div>
      <div class="stat"><div class="v" id="fa">0</div><div class="l">Attempted</div></div>
    </div>
    <button class="btn btn-primary" onclick="resetAll()">Try Again</button>
  </div>
</div>
<script>
var QS = [];
var state = { cur:0, answers:[], checked:[], results:[], score:0, total:0 };
var dragId=null, dragFrom=null;

function defQ(id,tag,ll,rl,items,targets){
  QS.push({id:id,tag:tag,ll:ll,rl:rl,items:items,targets:targets});
}

defQ(1,"Scrum Roles","Role","Responsibility",
  [{id:"po",t:"Product Owner"},{id:"sm",t:"Scrum Master"},{id:"dt",t:"Development Team"}],
  [{id:"a",l:"Defines user stories and acceptance criteria.",ans:"po"},
   {id:"b",l:"Collaborates to deliver potentially shippable increments.",ans:"dt"},
   {id:"c",l:"Protects the team from outside interruptions.",ans:"sm"}]);

   {id:"b",l:"Blended Reporting",ans:"hy"},
   {id:"c",l:"EVM",ans:"al"},
   {id:"d",l:"Lessons Learned Register",ans:"al"}]);

defQ(3,"Methodology","Methodology","Item",
  [{id:"hy",t:"Hybrid"},{id:"al",t:"All"},{id:"ag",t:"Agile"},{id:"tr",t:"Traditional"}],
  [{id:"a",l:"Daily Standups",ans:"ag"},
   {id:"b",l:"Rolling Wave Planning",ans:"hy"},
   {id:"c",l:"WBS",ans:"tr"},
   {id:"d",l:"Risk Planning and Identification",ans:"al"}]);

defQ(4,"Methodology","Methodology","Action",
  [{id:"ag",t:"Agile"},{id:"tr",t:"Traditional"},{id:"hy",t:"Hybrid"}],
  [{id:"a",l:"Follows a sequential phase approach from initiation to closure.",ans:"tr"},
   {id:"b",l:"Delivers work in iterative cycles.",ans:"ag"},
   {id:"c",l:"Uses a project management plan and backlog.",ans:"hy"}]);

defQ(5,"Impediments","Impediment","Action",

  [{id:"a",l:"Implement a change control process to formally review and approve changes.",ans:"sc"},
   {id:"b",l:"Establish a communication management plan.",ans:"cb"},

   {id:"d",l:"Execute the risk response plan.",ans:"rr"},
   {id:"e",l:"Adjust allocations or seek additional support.",ans:"rs"}]);

defQ(6,"MBTI Types","Type","Description",
  [{id:"th",t:"Thinking (T)"},{id:"se",t:"Sensing (S)"},{id:"ex",t:"Extraversion (E)"},{id:"ju",t:"Judging (J)"}],
  [{id:"a",l:"Thrives in team meetings; gains energy from interacting with colleagues.",ans:"ex"},
   {id:"b",l:"Makes decisions logically and objectively, analyzing data for fairness.",ans:"th"},
   {id:"c",l:"Organized, prefers clear plans, structure and deadlines.",ans:"ju"},
   {id:"d",l:"Detail-oriented, focuses on concrete facts and practical information.",ans:"se"}]);

defQ(7,"Tools & Problems","Tool","Problem",
  [{id:"rl",t:"Resource Leveling"},{id:"pe",t:"PERT Analysis"},{id:"cc",t:"Change Control Process"},{id:"nd",t:"Network Diagram"},{id:"gc",t:"Gantt Chart"}],
  [{id:"a",l:"Missed Deadlines",ans:"gc"},
   {id:"b",l:"Team members assigned more work than they can handle.",ans:"rl"},
   {id:"c",l:"Unclear Task Dependencies",ans:"nd"},
   {id:"d",l:"Frequent Scope Adjustments",ans:"cc"},
   {id:"e",l:"Inaccurate Time Estimates",ans:"pe"}]);

defQ(8,"Risk Attributes","Risk","Action",
  [{id:"ur",t:"Urgency"},{id:"pr",t:"Proximity"},{id:"do",t:"Dormancy"},{id:"co",t:"Connectivity"}],
  [{id:"a",l:"Measures the time until the risk impacts the project.",ans:"do"},
   {id:"b",l:"Assesses the speed at which a risk requires a response.",ans:"ur"},
   {id:"c",l:"Identifies how risks are interconnected with other project risks.",ans:"co"},
   {id:"d",l:"Evaluates the closeness of the risk event to the present time.",ans:"pr"}]);

defQ(9,"Methodology","Methodology","Item",
  [{id:"tr",t:"Traditional"},{id:"al",t:"All"},{id:"hy",t:"Hybrid"},{id:"ag",t:"Agile"}],
  [{id:"a",l:"Gantt Chart",ans:"tr"},
   {id:"b",l:"Phase Gate Reviews",ans:"tr"},
   {id:"c",l:"Sprint Planning",ans:"ag"},
   {id:"d",l:"Stakeholder Analysis",ans:"al"}]);

defQ(10,"Methodology","Methodology","Item",
  [{id:"ag",t:"Agile"},{id:"tr",t:"Traditional"},{id:"hy",t:"Hybrid"},{id:"al",t:"All"}],
  [{id:"a",l:"Mixed Deliverables",ans:"hy"},
   {id:"b",l:"Resource Management Plan",ans:"tr"},
   {id:"c",l:"Resource Management",ans:"al"},
   {id:"d",l:"Incremental Delivery",ans:"ag"}]);

defQ(11,"Tools & Problems","Tool","Problem",
  [{id:"mo",t:"MoSCoW Method"},{id:"tb",t:"Time-Boxing"},{id:"rw",t:"Rolling Wave Planning"},{id:"kb",t:"Kanban Board"},{id:"pd",t:"PDM"}],
  [{id:"a",l:"Uncoordinated Task Handovers",ans:"pd"},
   {id:"b",l:"Meeting Going Off Topic",ans:"tb"},
   {id:"c",l:"Activities Dependency Issues",ans:"rw"},
   {id:"d",l:"Unplanned Work",ans:"kb"},
   {id:"e",l:"Unclear Task Prioritization",ans:"mo"}]);

defQ(12,"Collaboration Tools","Tool","Task",
  [{id:"tt",t:"Time Tracking Software"},{id:"ob",t:"Online Bulletin Boards"},{id:"vc",t:"Video Conferencing"},{id:"vcs",t:"Version Control System"},{id:"cr",t:"Chat Rooms"}],
  [{id:"a",l:"Coordinate collaborative editing to ensure version consistency.",ans:"vcs"},
   {id:"b",l:"Display project milestones and timelines for team members to track progress.",ans:"ob"},
   {id:"c",l:"Organise a project status update meeting with remote team members.",ans:"vc"},
   {id:"d",l:"Facilitate real-time discussion for quick decision-making.",ans:"cr"},
   {id:"e",l:"Monitor team members work hours and project time allocation.",ans:"tt"}]);

defQ(13,"Roles","Role","Description",
  [{id:"ba",t:"Business Analyst"},{id:"po",t:"Product Owner"},{id:"ps",t:"Project Sponsor"},{id:"pm",t:"Project Manager"},{id:"fm",t:"Functional Manager"}],
  [{id:"a",l:"Defines acceptance criteria for project deliverables in the product backlog.",ans:"po"},
   {id:"b",l:"Develops detailed project plans including schedules, budgets, and resource allocation.",ans:"pm"},
   {id:"c",l:"Maps out existing business processes to identify areas for improvement.",ans:"ba"}]);

defQ(14,"Risk Attributes","Risk","Action",
  [{id:"co",t:"Connectivity"},{id:"do",t:"Dormancy"},{id:"ur",t:"Urgency"},{id:"pr",t:"Proximity"}],
  [{id:"a",l:"Determines the potential delay before the risk materializes.",ans:"do"},
   {id:"b",l:"Prioritizes risks that need immediate action.",ans:"ur"},
   {id:"c",l:"Maps the risk dependencies to understand potential ripple effects.",ans:"co"},
   {id:"d",l:"Gauges how imminent the risk event is to project execution.",ans:"pr"}]);

defQ(15,"Risk Attributes","Risk","Action",
  [{id:"do",t:"Dormancy"},{id:"co",t:"Connectivity"},{id:"ur",t:"Urgency"},{id:"pr",t:"Proximity"}],
  [{id:"a",l:"Identifies the latency period of the risk.",ans:"do"},
   {id:"b",l:"Evaluates the required response time for the risk.",ans:"ur"},
   {id:"c",l:"Analyzes the links between this risk and others within the project.",ans:"co"},
   {id:"d",l:"Assesses how soon the risk is expected to affect the project.",ans:"pr"}]);

defQ(16,"Scrum Roles","Role","Responsibility",
  [{id:"dt",t:"Development Team"},{id:"sm",t:"Scrum Master"},{id:"po",t:"Product Owner"}],
  [{id:"a",l:"Removes external forces to keep the team productive.",ans:"sm"},
   {id:"b",l:"Determines the order of the work.",ans:"po"},
   {id:"c",l:"Determines how to do the actual work needed to build the product.",ans:"dt"}]);

defQ(17,"Interpersonal Skills","Skill","Description",
  [{id:"al",t:"Active Listening"},{id:"in",t:"Influencing"},{id:"ei",t:"Emotional Intelligence"},{id:"cr",t:"Conflict Resolution"},{id:"ne",t:"Negotiation"}],
  [{id:"a",l:"Convincing stakeholders to adopt a proposed project plan.",ans:"in"},
   {id:"b",l:"Reaching a compromise with a vendor on contract terms.",ans:"ne"},
   {id:"c",l:"A team member fully understands another concerns in a meeting.",ans:"al"},
   {id:"d",l:"Mediating a disagreement between two team members to find a solution.",ans:"cr"},
   {id:"e",l:"A leader empathizes with a stressed team member to provide support.",ans:"ei"}]);

defQ(18,"Methodology","Methodology","Action",
  [{id:"hy",t:"Hybrid"},{id:"tr",t:"Traditional"},{id:"ag",t:"Agile"}],
  [{id:"a",l:"Team does daily stand-ups with a WBS.",ans:"hy"},
   {id:"b",l:"Adapts to changing requirements even late in development.",ans:"ag"},
   {id:"c",l:"Conducts detailed WBS and Gantt chart planning.",ans:"tr"}]);

defQ(19,"Predictive vs Agile","Description","Approach",
  [{id:"ev",t:"Evolving throughout the project"},{id:"fx",t:"Fixed at the beginning"},{id:"mf",t:"Managed via formal change control"},{id:"ec",t:"Embraced and incorporated continuously"},{id:"mi",t:"Managed iteratively"},{id:"ap",t:"Assessed and planned upfront"},{id:"ai",t:"Actively involved throughout"},{id:"li",t:"Limited involvement after initial planning"},{id:"cd",t:"Clearly defined and controlled"},{id:"fa",t:"Flexible and adaptive"}],
  [{id:"a",l:"Requirements - Predictive",ans:"fx"},
   {id:"b",l:"Requirements - Agile",ans:"ev"},
   {id:"c",l:"Changes - Predictive",ans:"mf"},
   {id:"d",l:"Changes - Agile",ans:"ec"},
   {id:"e",l:"Risk & Cost - Predictive",ans:"ap"},
   {id:"f",l:"Risk & Cost - Agile",ans:"mi"},
   {id:"g",l:"Key Stakeholders - Predictive",ans:"li"},
   {id:"h",l:"Key Stakeholders - Agile",ans:"ai"},
   {id:"i",l:"Project Scope - Predictive",ans:"cd"},
   {id:"j",l:"Project Scope - Agile",ans:"fa"}]);

defQ(20,"Collaboration Tools","Tool","Task",
  [{id:"cr",t:"Chat Rooms"},{id:"vc",t:"Video Conferencing"},{id:"pct",t:"Project Collaboration Tools"},{id:"vcs",t:"Version Control System"},{id:"ob",t:"Online Bulletin Boards"}],
  [{id:"a",l:"Track and merge code changes from multiple developers.",ans:"vcs"},
   {id:"b",l:"Edit project documents in real-time with team members.",ans:"pct"},
   {id:"c",l:"Collect and display team feedback and suggestions.",ans:"ob"},
   {id:"d",l:"Resolve immediate project issues through instant messaging.",ans:"cr"},
   {id:"e",l:"Conduct project kickoff meetings with geographically dispersed stakeholders.",ans:"vc"}]);

defQ(21,"Tools & Problems","Tool","Problem",
  [{id:"wb",t:"WBS"},{id:"ev",t:"EVM"},{id:"cp",t:"CPM"},{id:"sm",t:"Status Meetings"},{id:"sb",t:"Schedule Baseline"}],
  [{id:"a",l:"Overlapping Activities",ans:"wb"},
   {id:"b",l:"How Far Off Schedule",ans:"ev"},
   {id:"c",l:"Fragmented Work",ans:"wb"},
   {id:"d",l:"Unrealistic Deadlines",ans:"cp"},
   {id:"e",l:"Inconsistent Reporting",ans:"sm"}]);

defQ(22,"Tuckman Stages","Stage","Description",
  [{id:"fo",t:"Forming"},{id:"st",t:"Storming"},{id:"no",t:"Norming"},{id:"pe",t:"Performing"},{id:"ad",t:"Adjourning"}],
  [{id:"a",l:"Final stage - team reflects on achievements and transitions out.",ans:"ad"},
   {id:"b",l:"Team works collaboratively and effectively towards common goals.",ans:"pe"},
   {id:"c",l:"Team members develop stronger relationships and cohesion.",ans:"no"},
   {id:"d",l:"Characterized by power struggles and competition.",ans:"st"},
   {id:"e",l:"Initial stage - team members are polite and oriented towards the task.",ans:"fo"}]);

defQ(23,"Methodology","Methodology","Item",
  [{id:"ag",t:"Agile"},{id:"tr",t:"Traditional"},{id:"hy",t:"Hybrid"}],
  [{id:"a",l:"PM uses a PM Plan for near term while keeping future tasks high level using a product backlog.",ans:"hy"},

defQ(24,"Methodology","Methodology","Item",
  [{id:"tr",t:"Traditional"},{id:"ag",t:"Agile"},{id:"hy",t:"Hybrid"}],
  [{id:"a",l:"Each morning, team gathers for a brief meeting to share what they did yesterday.",ans:"ag"},
   {id:"b",l:"PM gathers all stakeholders to outline project objectives, deliverables, schedule and roles.",ans:"tr"},
   {id:"c",l:"PM involves stakeholders continuously using Agile practices while maintaining structured scope.",ans:"hy"}]);

defQ(25,"Tuckman Stages","Stage","Description",
  [{id:"fo",t:"Forming"},{id:"st",t:"Storming"},{id:"no",t:"Norming"},{id:"pe",t:"Performing"},{id:"ad",t:"Adjourning"}],

defQ(26,"Roles","Role","Description",

defQ(27,"Methodology","Methodology","Action",
  [{id:"tr",t:"Traditional"},{id:"hy",t:"Hybrid"},{id:"ag",t:"Agile"}],

defQ(28,"Tools","Tool","Description",

defQ(29,"Agile Documents","Document","Description",

  [{id:"a",l:"Target Audience Demographics",ans:"up"},
   {id:"b",l:"Understanding customer perception of value",ans:"us"},

defQ(30,"Tuckman Stages","Stage","Description",
  [{id:"fo",t:"Forming"},{id:"st",t:"Storming"},{id:"no",t:"Norming"},{id:"pe",t:"Performing"},{id:"ad",t:"Adjourning"}],

defQ(31,"Risk Response","Risk Response","Action",
  [{id:"tr",t:"Transfer"},{id:"mi",t:"Mitigate"},{id:"es",t:"Escalate"},{id:"av",t:"Avoid"},{id:"ac",t:"Accept"}],
  [{id:"a",l:"Adjust plans to remove the risk or its effects.",ans:"av"},

// Init state
state.answers = QS.map(function(){return {};});
state.checked = QS.map(function(){return false;});
state.results = QS.map(function(){return null;});

function getItem(q,id){
  for(var i=0;i<q.items.length;i++) if(q.items[i].id===id) return q.items[i];
  return null;
}

function renderNav(){
  var nav=document.getElementById('nav');
  var html='';
  for(var i=0;i<QS.length;i++){
    var cls='qnb';
    if(i===state.cur) cls+=' active';
    else if(state.results[i]==='correct') cls+=' ok';
    else if(state.results[i]==='wrong') cls+=' bad';
    html+='<button class="'+cls+'" onclick="goto('+i+')">'+(i+1)+'</button>';
  }
  nav.innerHTML=html;
}

function renderQ(idx){
  var q=QS[idx];
  var ans=state.answers[idx];
  var chk=state.checked[idx];
  var placed={};
  for(var k in ans) placed[ans[k]]=true;
  var bankItems=q.items.filter(function(it){return !placed[it.id];});

  var bankHtml='';
  if(bankItems.length===0){
    bankHtml='<div class="empty">All items placed</div>';
  } else {
    bankItems.forEach(function(it){
      bankHtml+='<div class="chip" draggable="true" id="chip_'+idx+'_'+it.id+'" ondragstart="dstart(event,\''+it.id+'\','+idx+',null)">'+it.t+'</div>';
    });
  }

  var zonesHtml='';
  q.targets.forEach(function(t){
    var pid=ans[t.id]||null;
    var item=pid?getItem(q,pid):null;
    var correct=chk&&pid&&pid===t.ans;
    var wrong=chk&&pid&&pid!==t.ans;
    var zc='zone'+(correct?' z-ok':wrong?' z-bad':'');
    var inner='';
    if(item){
      var cc='chip'+(correct?' c-ok':wrong?' c-bad':'');
      if(!chk){
        inner='<div class="'+cc+'" draggable="true" ondragstart="dstart(event,\''+pid+'\','+idx+',\''+t.id+'\')" onclick="returnBank('+idx+',\''+t.id+'\')">'+item.t+'</div>';
      } else {
        inner='<div class="'+cc+'">'+item.t+'</div>';
        if(wrong){
          var cor=getItem(q,t.ans);
          inner+='<div class="hint bad">Correct: '+(cor?cor.t:t.ans)+'</div>';
        } else if(correct){
          inner+='<div class="hint ok">Correct!</div>';
        }
      }
    } else {
      inner='<div class="empty">'+(chk?'—':'Drop here')+'</div>';
    }
    zonesHtml+='<div class="trow"><div class="tlabel">'+t.l+'</div><div class="'+zc+'" ondragover="dover(event)" ondragleave="dleave(event)" ondrop="ddrop(event,'+idx+',\''+t.id+'\')">'+inner+'</div></div>';
  });

  var correct_count=q.targets.filter(function(t){return ans[t.id]===t.ans;}).length;
  var all_ok=chk&&correct_count===q.targets.length;
  var some_bad=chk&&correct_count<q.targets.length;

  var expHtml='';
  q.targets.forEach(function(t){
    var cor=getItem(q,t.ans);
    expHtml+='<div style="margin-bottom:6px"><strong>'+(cor?cor.t:t.ans)+'</strong> &rarr; '+t.l+'</div>';
  });

  var actHtml='';
  if(!chk) actHtml+='<button class="btn btn-green" onclick="checkAns('+idx+')">Check Answer</button>';
  actHtml+='<button class="btn btn-ghost" onclick="resetQ('+idx+')">Reset</button>';
  actHtml+='<button class="btn btn-outline" onclick="toggleExp('+idx+')">Explain</button>';
  if(idx<QS.length-1) actHtml+='<button class="btn btn-primary" onclick="goto('+(idx+1)+')">Next &rarr;</button>';
  else actHtml+='<button class="btn btn-primary" onclick="showFinal()">Finish Quiz</button>';

  var html='<div class="card"><div class="qmeta"><span class="qnum">Q'+q.id+'</span><span class="qtag">'+q.tag+'</span></div>';
  html+='<div class="qtitle">Match each <strong>'+q.ll+'</strong> to the correct <strong>'+q.rl+'</strong></div>';
  html+='<div class="dnd"><div><div class="col-hd">'+q.ll+'</div><div class="bank" id="bank_'+idx+'" ondragover="dover(event)" ondragleave="dleave(event)" ondrop="dbank(event,'+idx+')">'+bankHtml+'</div></div>';
  html+='<div><div class="col-hd">'+q.rl+'</div><div class="targets">'+zonesHtml+'</div></div></div>';
  if(chk) html+='<div class="banner '+(all_ok?'ok':'bad')+' show">'+(all_ok?'All correct!':correct_count+' / '+q.targets.length+' correct. See corrections above.')+'</div>';
  html+='<div class="exp" id="exp_'+idx+'">'+expHtml+'</div>';
  html+='<div class="actions">'+actHtml+'</div></div>';

  document.getElementById('qc').innerHTML=html;
  updatePB();
}

function goto(i){state.cur=i;renderNav();renderQ(i);}

function dstart(e,id,qidx,fromZone){
  dragId=id; dragFrom=fromZone;
  e.dataTransfer.setData('text',id);
  e.dataTransfer.effectAllowed='move';
}
function dover(e){e.preventDefault();e.currentTarget.classList.add('over');}
function dleave(e){e.currentTarget.classList.remove('over');}

function ddrop(e,qidx,tid){
  e.preventDefault();
  e.currentTarget.classList.remove('over');
  if(state.checked[qidx]) return;
  var id=e.dataTransfer.getData('text')||dragId;
  if(!id) return;
  var ans=state.answers[qidx];
  if(dragFrom) delete ans[dragFrom];
  ans[tid]=id;
  dragId=null; dragFrom=null;
  renderQ(qidx);
}

function dbank(e,qidx){
  e.preventDefault();
  e.currentTarget.classList.remove('over');
  if(state.checked[qidx]||!dragFrom) return;
  delete state.answers[qidx][dragFrom];
  dragId=null; dragFrom=null;
  renderQ(qidx);
}

function returnBank(qidx,tid){
  if(state.checked[qidx]) return;
  delete state.answers[qidx][tid];
  renderQ(qidx);
}

function checkAns(idx){
  var q=QS[idx];
  var ans=state.answers[idx];
  state.checked[idx]=true;
  var ok=q.targets.every(function(t){return ans[t.id]===t.ans;});
  var prev=state.results[idx];
  state.results[idx]=ok?'correct':'wrong';
  if(prev===null){state.total++;if(ok)state.score++;}
  else{if(prev!=='correct'&&ok)state.score++;if(prev==='correct'&&!ok)state.score--;}
  document.getElementById('sc').textContent=state.score;
  document.getElementById('at').textContent=state.total;
  renderNav(); renderQ(idx);
}

function toggleExp(idx){
  var el=document.getElementById('exp_'+idx);
  if(el) el.classList.toggle('show');
}

function resetQ(idx){
  state.answers[idx]={};
  state.checked[idx]=false;
  if(state.results[idx]!==null){
    if(state.results[idx]==='correct') state.score--;
    state.results[idx]=null; state.total--;
  }
  document.getElementById('sc').textContent=state.score;
  document.getElementById('at').textContent=state.total;
  renderNav(); renderQ(idx);
}

function resetAll(){
  state.cur=0; state.score=0; state.total=0;
  state.answers=QS.map(function(){return {};});
  state.checked=QS.map(function(){return false;});
  state.results=QS.map(function(){return null;});
  document.getElementById('sc').textContent=0;
  document.getElementById('at').textContent=0;
  document.getElementById('fin').classList.remove('show');
  document.getElementById('qc').style.display='block';
  document.getElementById('nav').style.display='flex';
  renderNav(); renderQ(0);
}

function showFinal(){
  var att=state.results.filter(function(r){return r!==null;}).length;
  var cor=state.results.filter(function(r){return r==='correct';}).length;
  var wrg=state.results.filter(function(r){return r==='wrong';}).length;
  var pct=att>0?Math.round(cor/att*100):0;
  document.getElementById('fpct').textContent=pct+'%';
  document.getElementById('fc').textContent=cor;
  document.getElementById('fw').textContent=wrg;
  document.getElementById('fa').textContent=att;
  document.getElementById('fmsg').textContent=pct>=80?'Exam ready!':pct>=60?'Good progress, keep going!':'More practice needed.';
  document.getElementById('fsub').textContent='You attempted '+att+' of 100 questions.';
  document.getElementById('qc').style.display='none';
  document.getElementById('nav').style.display='none';
  document.getElementById('fin').classList.add('show');
}

function updatePB(){
  var done=state.results.filter(function(r){return r!==null;}).length;
  document.getElementById('pb').style.width=(done/QS.length*100)+'%';
}

renderNav(); renderQ(0);
</script>
